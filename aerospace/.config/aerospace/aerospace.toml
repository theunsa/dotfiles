config-version = 2

# AeroSpace owns window layout; macOS Spaces should stay out of the workflow.
start-at-login = true
auto-reload-config = true
automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ["1", "2", "3", "4", "5"]
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
accordion-padding = 30

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Keep the pointer on the active display without making every focus change jumpy.
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]

after-startup-command = [
  'exec-and-forget borders active_color="glow(0xff88c0d0)" inactive_color=0x663b4252 width=4.0 style=round',
]

[key-mapping]
preset = "qwerty"

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# Dialog-like tools should not disturb the tiling tree.
[[on-window-detected]]
if.app-id = "com.apple.systempreferences"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.apple.calculator"
run = "layout floating"

[mode.main.binding]
# Outer navigation uses Alt; Ctrl-H/J/K/L remains available to tmux/Neovim.
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"

alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"

alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"

alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-shift-space = "layout floating tiling"
alt-f = "fullscreen"

alt-minus = "resize smart -50"
alt-equal = "resize smart +50"
alt-r = "mode resize"
alt-shift-semicolon = "mode service"

alt-enter = 'exec-and-forget open -na Ghostty'
alt-q = "close"

# Avoid accidental macOS application hiding while using window bindings.
cmd-h = []
cmd-alt-h = []

[mode.resize.binding]
h = "resize width -50"
j = "resize height +50"
k = "resize height -50"
l = "resize width +50"
minus = "resize smart -50"
equal = "resize smart +50"
enter = "mode main"
esc = "mode main"

[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]
b = ["balance-sizes", "mode main"]
f = ["layout floating tiling", "mode main"]
backspace = ["close-all-windows-but-current", "mode main"]

alt-shift-h = ["join-with left", "mode main"]
alt-shift-j = ["join-with down", "mode main"]
alt-shift-k = ["join-with up", "mode main"]
alt-shift-l = ["join-with right", "mode main"]
