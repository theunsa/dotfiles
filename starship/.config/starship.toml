palette = "nord"

format = """
$directory\
$git_branch\
$git_status\
\n$character"""

[directory]
style = "fg:$nord8"
format = "[$path]($style) "
truncation_length = 10
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "fg:$nord9"
format = '[$symbol $branch]($style) '

[git_status]
style = "fg:$nord11"
format = '[($all_status$ahead_behind)]($style) '

[nodejs]
symbol = ""
style = "bg:$nord10"
format = '[[ $symbol ($version) ](fg:$nord6 bg:$nord10)]($style)'

[rust]
symbol = ""
style = "bg:$nord10"
format = '[[ $symbol ($version) ](fg:$nord6 bg:$nord10)]($style)'

[golang]
symbol = ""
style = "bg:$nord10"
format = '[[ $symbol ($version) ](fg:$nord6 bg:$nord10)]($style)'

[php]
symbol = ""
style = "bg:$nord10"
format = '[[ $symbol ($version) ](fg:$nord6 bg:$nord10)]($style)'

[time]
disabled = true
time_format = "%R"                                      # Hour:Minute Format
style = "bg:$nord0"
format = '[[  $time ](fg:$nord4 bg:$nord0)]($style)'

[palettes.nord]
nord0 = "#2e3440"
nord1 = "#3b4252"
nord2 = "#434c5e"
nord3 = "#4c566a"
nord4 = "#d8dee9"
nord5 = "#e5e9f0"
nord6 = "#eceff4"
nord7 = "#8fbcbb"
nord8 = "#88c0d0"
nord9 = "#81a1c1"
nord10 = "#5e81ac"
nord11 = "#bf616a"
nord12 = "#d08770"
nord13 = "#ebcb8b"
nord14 = "#a3be8c"
nord15 = "#b48ead"
