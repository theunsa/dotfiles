# Remap prefix key to Ctrl+a
unbind C-b
set -g prefix C-a
# Send Ctrl+a to applications by pressing it twice
bind C-a send-prefix

# Reload config on prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Allow mouse to resize panes
set -g mouse on

set -sa terminal-features ",ghostty:RGB,xterm-ghostty:RGB,xterm-256color:RGB,xterm*:RGB"
set -g default-terminal "tmux-256color"
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'

# Set move keys between panes
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Plugins

## Tmux Package Manager
set -g @plugin 'tmux-plugins/tpm'
set-environment -g -F TMUX_PLUGIN_MANAGER_PATH "#{HOME}/.local/share/tmux/plugins/"

## Plugin for seamless integration between neovim and tmux
set -g @plugin 'christoomey/vim-tmux-navigator'

## Session persistence (auto-save and restore after reboot)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

## Status metrics
set -g @plugin 'tmux-plugins/tmux-cpu'

## Sesh session switcher (prefix + s)
unbind s
bind-key "s" run-shell "target=\"$(
  sesh list | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\"; [ -n \"$target\" ] && zsh -ic 't \"$1\"' _ \"$target\""

## Sesh works better with these
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

## Plugin for tmux theme (nord)
set -g @nord_tmux_no_patched_font "1"
set -g @nord_tmux_show_status_content "0"
set -g @plugin 'arcticicestudio/nord-tmux'
set -g status-left-length 100
set -g status-right-length 200

# Initialize tmux plugin manager before the final statusline overrides so plugins
# can load without mutating the final rendered segments.
run '~/.local/share/tmux/plugins/tpm/tpm'

if-shell '[ -f ~/.local/share/tmux/plugins/nord-tmux/src/nord.conf ]' 'source-file ~/.local/share/tmux/plugins/nord-tmux/src/nord.conf'

set -g status-left "#[fg=black,bg=blue,bold] #S "
set -g window-status-format " #[fg=white,bg=brightblack]#I #[fg=white,bg=brightblack]#W #F"
set -g window-status-current-format " #[fg=black,bg=cyan]#I#[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#W #F"
set -g window-status-separator ""
set -g status-right "#{prefix_highlight}#[fg=white,bg=brightblack]  #{cpu_percentage} #[fg=white,bg=brightblack,nobold,noitalics,nounderscore]|#[fg=white,bg=brightblack] 󰍛 #(memory_pressure | awk -F': ' '/System-wide memory free percentage/ { sub(/.$/, \"\", $2); v = 100 - $2; if (v < 10) print \"  \" v; else if (v < 100) print \" \" v; else print v }')%% #[fg=white,bg=brightblack,nobold,noitalics,nounderscore]|#[fg=white,bg=brightblack] 󰥔 %H:%M #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore] #[fg=black,bg=cyan,bold] 󰣇 #H "
